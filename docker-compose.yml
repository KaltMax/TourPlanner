name: tourplanner

services:
  tourplanner.db:
    image: postgres:latest
    container_name: tourplanner-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  tourplanner.api:
    image: ${DOCKER_REGISTRY-}tourplannerapi
    build:
      context: .
      dockerfile: TourPlanner.API/Dockerfile
    environment:
      - ConnectionStrings__TourPlannerDb=Host=tourplanner.db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - OpenRouteService__ApiKey=${ORS_API_KEY}
    depends_on:
      tourplanner.db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
