name: Build and Test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest 
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    
    - name: Restore dependencies
      run: dotnet restore TourPlanner.sln
    
    - name: Build solution
      run: dotnet build TourPlanner.sln --no-restore --configuration Release
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: built-solution
        path: |
          **/bin/Release/**
          **/obj/Release/**
        retention-days: 1

    - name: Upload UI publish artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ui-publish
        path: TourPlanner.UI/bin/Release/
        retention-days: 1

  test:
    needs: build
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
        
    - name: Download build artifacts
      uses: actions/download-artifact@v8
      with:
        name: built-solution
        
    - name: Run tests
      run: dotnet test TourPlanner.Test/TourPlanner.Test.csproj --no-build --configuration Release

  create-release:
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    
    steps:
    - name: Checkout full repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Download UI artifacts
      uses: actions/download-artifact@v8
      with:
        name: ui-publish
        path: release-artifacts/TourPlanner.UI

    - name: Package release
      run: |
        New-Item -Path "release-package" -ItemType Directory -Force
        Copy-Item -Path "release-artifacts\TourPlanner.UI" -Destination "release-package\TourPlanner.UI" -Recurse
        Copy-Item -Path "TourPlanner.API" -Destination "release-package\TourPlanner.API" -Recurse
        Copy-Item -Path "TourPlanner.BLL" -Destination "release-package\TourPlanner.BLL" -Recurse
        Copy-Item -Path "TourPlanner.DAL" -Destination "release-package\TourPlanner.DAL" -Recurse
        Copy-Item -Path "TourPlanner.Logging" -Destination "release-package\TourPlanner.Logging" -Recurse
        Copy-Item -Path "docker-compose.yml" -Destination "release-package\docker-compose.yml"
        Copy-Item -Path "docker-compose.override.yml" -Destination "release-package\docker-compose.override.yml"
        Copy-Item -Path ".dockerignore" -Destination "release-package\.dockerignore"
        Copy-Item -Path ".env.example" -Destination "release-package\.env.example"
        Copy-Item -Path "README.md" -Destination "release-package\README.md"
        
    - name: Zip release artifacts
      run: |
        Compress-Archive -Path release-package\* -DestinationPath TourPlanner-latest.zip -Force
    
    - name: Get current date
      id: date
      run: echo "date=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> $env:GITHUB_OUTPUT
        
    - name: Delete existing release
      run: gh release delete latest --yes --cleanup-tag 2>$null; exit 0
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: TourPlanner Latest Build
        body: |
          Latest successful build of TourPlanner
          Build from branch: ${{ github.ref_name }}
          Created: ${{ steps.date.outputs.date }}
        files: TourPlanner-latest.zip
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}